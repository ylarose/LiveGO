<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live Console</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #11132a 0%, #070814 100%);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.07);
            --glow-color: rgba(99, 102, 241, 0.15);
            --primary: #818cf8;
            --primary-g1: #6366f1;
            --primary-g2: #4f46e5;
            --secondary: #a78bfa;
            --accent: #22d3ee;
            --accent-g: #06b6d4;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --danger: #f43f5e;
            --danger-glow: rgba(244, 63, 94, 0.2);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-dark: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Ambient glowing background blobs */
        .glowing-blob {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(139, 92, 246, 0.05) 50%, transparent 100%);
            filter: blur(40px);
            z-index: -1;
            pointer-events: none;
        }

        .blob-1 { top: 10%; left: 10%; }
        .blob-2 { bottom: 10%; right: 10%; }

        header {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--panel-border);
            background: rgba(11, 12, 30, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .brand-logo svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .brand-title {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .session-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--panel-border);
            border-radius: 99px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dark);
            box-shadow: 0 0 8px rgba(100, 116, 139, 0.4);
        }

        body.connected .status-dot {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 32px;
            height: calc(100vh - 89px);
            min-height: 600px;
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
                height: auto;
                overflow-y: auto;
            }
        }

        /* Columns & Cards */
        .config-column, .chat-column {
            display: flex;
            flex-direction: column;
            gap: 24px;
            height: 100%;
        }

        .glass-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0) 80%);
            pointer-events: none;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }

        .card-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .card-icon svg {
            width: 18px;
            height: 18px;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        /* Config / Prompt Layout */
        .prompt-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 16px;
        }

        textarea {
            width: 100%;
            flex: 1;
            min-height: 250px;
            background: rgba(10, 10, 20, 0.5);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--glow-color);
            background: rgba(10, 10, 20, 0.8);
        }

        button.primary-btn {
            background: linear-gradient(135deg, var(--primary-g1) 0%, var(--primary-g2) 100%);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
        }

        button.primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        button.primary-btn:active {
            transform: translateY(1px);
        }

        button.primary-btn:disabled {
            background: var(--text-dark);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.5;
        }

        /* System Messages Panel */
        .system-feedback {
            height: 120px;
            background: rgba(10, 11, 22, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .feedback-label {
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--secondary);
        }

        .system-msg-box {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: var(--accent);
            overflow-y: auto;
            word-break: break-all;
            flex: 1;
        }

        /* Live Chat Layout */
        .live-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0; /* Important for scroll container in flex */
        }

        /* Status panel inside chat card */
        .status-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-value {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
        }

        body.connected .status-value {
            color: var(--success);
        }

        /* Visual Audio Waves */
        .wave-visualizer {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 24px;
            opacity: 0.3;
        }

        body.connected .wave-visualizer {
            opacity: 1;
        }

        .wave-bar {
            width: 3px;
            height: 6px;
            background: var(--accent);
            border-radius: 99px;
        }

        body.connected .wave-bar {
            background: linear-gradient(to top, var(--primary) 0%, var(--accent) 100%);
            animation: bounce-wave 1.2s ease-in-out infinite alternate;
        }

        .wave-bar:nth-child(2) { animation-delay: 0.15s; height: 12px; }
        .wave-bar:nth-child(3) { animation-delay: 0.3s; height: 18px; }
        .wave-bar:nth-child(4) { animation-delay: 0.45s; height: 10px; }
        .wave-bar:nth-child(5) { animation-delay: 0.6s; height: 14px; }

        @keyframes bounce-wave {
            0% { transform: scaleY(0.4); }
            100% { transform: scaleY(1.8); }
        }

        /* Transcript area styling */
        .transcript-container {
            flex: 1;
            background: rgba(10, 10, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Modern Chat Bubble Styling */
        #transcript p {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            margin-bottom: 16px;
            animation: slideInUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Distinguish between Gemini / AI responses and User/System responses */
        .chat-bubble {
            padding: 12px 16px;
            border-radius: 0 16px 16px 16px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .chat-bubble.gemini {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            align-self: flex-start;
            border-radius: 16px 16px 16px 0;
        }

        .chat-bubble.user {
            background: rgba(34, 211, 238, 0.08);
            border: 1px solid rgba(34, 211, 238, 0.2);
            align-self: flex-end;
            border-radius: 16px 16px 0 16px;
        }

        .chat-bubble .sender {
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            color: var(--secondary);
        }

        .chat-bubble.user .sender {
            color: var(--accent);
            text-align: right;
        }

        .chat-bubble .text {
            color: var(--text-main);
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Session Trigger Controls */
        .control-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 10px;
        }

        .action-circle-btn {
            position: relative;
            background: linear-gradient(135deg, var(--primary-g1) 0%, var(--primary-g2) 100%);
            border: none;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4), inset 0 2px 4px rgba(255,255,255,0.2);
        }

        .action-circle-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.6), inset 0 2px 4px rgba(255,255,255,0.3);
        }

        .action-circle-btn:active {
            transform: scale(0.98);
        }

        .action-circle-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
        }

        /* Pulsing ring outer animations for session button */
        .action-ring {
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            border: 1px solid var(--primary);
            opacity: 0;
            pointer-events: none;
        }

        body.connected .action-ring {
            animation: ring-pulse 2s cubic-bezier(0.25, 0, 0, 1) infinite;
        }

        @keyframes ring-pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.25); opacity: 0; border-color: var(--accent); }
        }

        /* Switch UI theme on Connect */
        body.connected .action-circle-btn {
            background: linear-gradient(135deg, var(--danger) 0%, #e11d48 100%);
            box-shadow: 0 10px 30px var(--danger-glow), inset 0 2px 4px rgba(255,255,255,0.2);
        }

        body.connected .action-circle-btn:hover {
            box-shadow: 0 15px 40px rgba(244, 63, 94, 0.45);
        }

        /* Background grid overlay for premium feel */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            z-index: -2;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="glowing-blob blob-1"></div>
    <div class="glowing-blob blob-2"></div>

    <header>
        <div class="brand-container">
            <div class="brand-logo">
                <!-- SVG Sparkle Icon -->
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L14.8 8.6L22 10L16.4 14.6L18.2 22L12 18L5.8 22L7.6 14.6L2 10L9.2 8.6L12 2Z"/>
                </svg>
            </div>
            <div>
                <h1 class="brand-title">Gemini Live Console</h1>
            </div>
        </div>
        <div class="session-badge">
            <div class="status-dot"></div>
            <span id="header-status">Standby</span>
        </div>
    </header>

    <main>
        <!-- Left Panel: Configuration -->
        <section class="config-column">
            <div class="glass-card prompt-card" style="flex: 1;">
                <div class="card-header">
                    <div class="card-icon">
                        <!-- SVG sliders/settings icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="4" y1="21" x2="4" y2="14"></line>
                            <line x1="4" y1="10" x2="4" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12" y2="3"></line>
                            <line x1="20" y1="21" x2="20" y2="16"></line>
                            <line x1="20" y1="12" x2="20" y2="3"></line>
                            <line x1="1" y1="14" x2="7" y2="14"></line>
                            <line x1="9" y1="8" x2="15" y2="8"></line>
                            <line x1="17" y1="16" x2="23" y2="16"></line>
                        </svg>
                    </div>
                    <h2 class="card-title">System Instruction Setup</h2>
                </div>
                <div class="prompt-container">
                    <textarea id="promptText" placeholder="Define the AI assistant's persona, language, and guidelines...">Ton nom est Marie, tu parles francais avec une voix féminine et un accent francais, et tu aides des clients à localiser leur colis.
Commences la conversation par donner ton nom, et demander comment tu peux aider le client à localiser le colis.
Ton role est de demander au client le numéro de colis, et de lui donner des informations sur ce colis.
Tu as à ta disposition deux outils : 
- "getDeliveryByNumber" qui donne prend en entrée le numéro de colis, et retourne des informations en anglais sur le colis. 
- "getDeliveryByName" qui prend en entrée le nom propre du client,  et retourne des informations en anglais sur le colis. 
Utilise the 2e outil: "getDeliveryByName" uniquement si le premier n'a pas donné de résultat
Les informations retournées par les deux outils ont la meme structure:
Nom du client, numéro de colis, status (delivered, cancelled, delayed) et addresse de livraison.
Par exemple:
"Delivery information: LastName=Dupond, Number=1234, Status=Delivered, Address=12 rue de paix, City=Paris"

Finis la conversation en demandant au client s'il a une autre question.</textarea>
                    
                    <button class="primary-btn" id="sendPrompt">
                        <!-- SVG Sparkle button icon -->
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                        </svg>
                        <span>Setup Prompt</span>
                    </button>
                </div>
            </div>

            <!-- System Messages Log -->
            <div class="glass-card" style="height: auto; min-height: 140px;">
                <div class="card-header" style="margin-bottom: 12px; padding-bottom: 8px;">
                    <div class="card-icon">
                        <!-- SVG Terminal Icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="4 17 10 11 4 5"></polyline>
                            <line x1="12" y1="19" x2="20" y2="19"></line>
                        </svg>
                    </div>
                    <h2 class="card-title">Console Feedback</h2>
                </div>
                <div class="system-feedback">
                    <span class="feedback-label">Server Response</span>
                    <div class="system-msg-box" id="messages">Waiting to establish or update parameters...</div>
                </div>
            </div>
        </section>

        <!-- Right Panel: Live Audio Session -->
        <section class="chat-column">
            <div class="glass-card live-card">
                <div class="card-header">
                    <div class="card-icon" style="color: var(--accent);">
                        <!-- SVG Play/Activity Icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                    </div>
                    <h2 class="card-title">Live Audio Stream</h2>
                </div>

                <!-- Session status indicators -->
                <div class="status-container">
                    <div class="status-info">
                        <span class="status-label">Engine:</span>
                        <span id="status" class="status-value">Disconnected</span>
                    </div>
                    <div class="wave-visualizer">
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                    </div>
                </div>

                <!-- Scrollable Transcript Frame -->
                <div class="transcript-container" id="transcript">
                    <!-- Messages will be dynamically loaded here in modern layout -->
                </div>

                <!-- Session Activation Controls -->
                <div class="control-panel">
                    <button class="action-circle-btn" id="startBtn">
                        <div class="action-ring"></div>
                        <!-- SVG Microphone -->
                        <svg id="mic-icon" viewBox="0 0 24 24">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                        <span id="btn-text">Start Session</span>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const promptText = document.getElementById('promptText');
        const promptBtn = document.getElementById('sendPrompt');
        const startBtn = document.getElementById('startBtn');
        const btnText = document.getElementById('btn-text');
        const statusDiv = document.getElementById('status');
        const headerStatus = document.getElementById('header-status');
        const transcriptDiv = document.getElementById('transcript');
        const systemMsgDiv = document.getElementById('messages');
        const micIcon = document.getElementById('mic-icon');
        
        let socket;
        let audioContext;
        let processor;
        let microphone;
        
        // Setup initial system response instruction
        promptBtn.onclick = async () => {
            const strPrompt = promptText.value;
            console.log("sending prompt: " + strPrompt);
            systemMsgDiv.innerText = "Processing prompt...";
            
            try {
                const response = await fetch('/prompt', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=utf-8'
                    },
                    body: JSON.stringify({ prompt: strPrompt }),
                });
                
                if (!response.ok) {
                    throw new Error(`Response status: ${response.status}`);
                }
                
                const jsResult = await response.json();
                const resp = jsResult["Reponse"] || jsResult["Response"] || "Success";
                console.log(resp);
                systemMsgDiv.innerText = resp;
                systemMsgDiv.style.color = "var(--success)";
            } catch (err) {
                console.error(err);
                systemMsgDiv.innerText = "Error: " + err.message;
                systemMsgDiv.style.color = "var(--danger)";
            }
        }
        
        startBtn.onclick = async () => {
            if (socket) {
                stopSession();
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                startSession(stream);
            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('Could not access microphone. Please verify site permissions.');
            }
        };

        function startSession(stream) {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            socket = new WebSocket(`${protocol}//localhost:8080/ws`);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => {
                document.body.classList.add('connected');
                statusDiv.innerText = 'Connected';
                headerStatus.innerText = 'Active';
                btnText.innerText = 'Stop Session';
                
                // Change mic icon to stop/cancel power icon
                micIcon.innerHTML = `
                    <path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/>
                `;
                
                setupAudio(stream);
            };

            socket.onclose = () => {
                stopSession();
            };

            socket.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    const msg = JSON.parse(event.data);
                    if (msg.text) {
                        // Append with modern chat bubble element styling
                        const p = document.createElement('p');
                        p.className = 'chat-bubble gemini';
                        p.innerHTML = `<span class="sender">Gemini</span><span class="text">${msg.text}</span>`;
                        transcriptDiv.appendChild(p);
                        transcriptDiv.scrollTop = transcriptDiv.scrollHeight;
                    }
                } else {
                    // Binary data: Play audio
                    playAudioChunk(event.data);
                }
            };
        }

        function stopSession() {
            if (socket) socket.close();
            socket = null;
            if (processor) processor.disconnect();
            if (microphone) microphone.disconnect();
            if (audioContext) audioContext.close();
            
            document.body.classList.remove('connected');
            statusDiv.innerText = 'Disconnected';
            headerStatus.innerText = 'Standby';
            btnText.innerText = 'Start Session';
            
            // Revert back to microphone icon
            micIcon.innerHTML = `
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            `;
        }

        function setupAudio(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            microphone = audioContext.createMediaStreamSource(stream);
            
            processor = audioContext.createScriptProcessor(4096, 1, 1);
            
            processor.onaudioprocess = (e) => {
                const inputData = e.inputBuffer.getChannelData(0);
                const pcmData = floatTo16BitPCM(inputData);
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(pcmData.buffer);
                }
            };

            microphone.connect(processor);
            processor.connect(audioContext.destination);
        }

        function floatTo16BitPCM(input) {
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                const s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output;
        }

        // Simple audio queue for playback
        let nextStartTime = 0;
        function playAudioChunk(data) {
            if (!audioContext) return;

            const int16Array = new Int16Array(data);
            const floatArray = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) {
                floatArray[i] = int16Array[i] / 32768.0;
            }

            const buffer = audioContext.createBuffer(1, floatArray.length, 24000);
            buffer.getChannelData(0).set(floatArray);

            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);

            const currentTime = audioContext.currentTime;
            if (nextStartTime < currentTime) {
                nextStartTime = currentTime;
            }
            source.start(nextStartTime);
            nextStartTime += buffer.duration;
        }
    </script>
</body>
